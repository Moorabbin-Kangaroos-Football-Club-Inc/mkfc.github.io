  "email": "info@mkfc.org.au",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "41 Widdop Crescent",
    "addressLocality": "Hampton East",
    "addressRegion": "VIC",
    "postalCode": "3188",
    "addressCountry": "AU"
  },
  "location": {
    "@type": "Place",
    "name": "Widdop Crescent Oval",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "41 Widdop Crescent",
      "addressLocality": "Hampton East",
      "addressRegion": "VIC",

      "addressCountry": "AU"
    },
    "hasMap": "https://maps.app.goo.gl/EqwponkRzfhLmvSZ6"

  "memberOf": {
    "@type": "SportsOrganization",
    "name": "Southern Football and Netball League",
    "url": "https://www.sfnl.com.au/"
  },
  "sameAs": [
    "https://www.facebook.com/MoorabbinKangas",
    "https://instagram.com/moorabbinroos",
    "https://twitter.com/moorabbinroos"
  ]
}
</script>

{%- if page.url and page.url != "/" and page.title -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.url }}/"
    }{%- if page.layout == "post" -%},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "News",
      "item": "{{ site.url }}/news/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ page.title | jsonify }},
      "item": "{{ site.url }}{{ page.url }}"
    }
    {%- else -%},
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ page.title | jsonify }},
      "item": "{{ site.url }}{{ page.url }}"
    }
    {%- endif %}
  ]
}
</script>
{%- endif -%}

{%- if page.url == "/calendar/" and site.data.fixtures.games -%}
{%- for game in site.data.fixtures.games -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SportsEvent",
  "name": "Moorabbin Kangaroos vs {{ game.opponent }} — Round {{ game.round }}",
  "description": "SFNL Division 4, Round {{ game.round }}: Moorabbin Kangaroos vs {{ game.opponent }} ({{ game.home_away }} game).",
  "startDate": "{{ game.date | date: '%Y-%m-%d' }}T14:00:00+10:00",
  "endDate": "{{ game.date | date: '%Y-%m-%d' }}T17:00:00+10:00",
  "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
  "eventStatus": "https://schema.org/EventScheduled",
  "sport": "Australian rules football",
  "location": {
    "@type": "Place",
    "name": {{ game.venue | jsonify }},
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Melbourne",
      "addressRegion": "VIC",
      "addressCountry": "AU"
    }
  },
  "homeTeam": {
    "@type": "SportsTeam",
    "name": "{% if game.home_away == 'Home' %}Moorabbin Kangaroos{% else %}{{ game.opponent }}{% endif %}"
  },
  "awayTeam": {
    "@type": "SportsTeam",
    "name": "{% if game.home_away == 'Home' %}{{ game.opponent }}{% else %}Moorabbin Kangaroos{% endif %}"
  },
  "organizer": {
    "@type": "SportsOrganization",
    "name": "Southern Football and Netball League",
    "url": "https://www.sfnl.com.au/"
  },
  "isAccessibleForFree": true,
  "url": "https://www.mkfc.org.au/calendar/"
}
</script>
{%- endfor -%}
{%- endif -%}
