# Site settings
title: Moorabbin Kangaroos Football Club
email: media@mkfc.org.au
description: Official site of the Moorabbin Kangaroos Football Club — SFNL Division 4 community Australian rules football club based at Widdop Crescent Oval, Hampton East.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.mkfc.org.au" # the base hostname & protocol for your site, e.g. http://example.com

lang: en-AU
locale: en_AU

avatar: "/favicon.png"
logo: /mkfc-logo-large.png

# Your name to show in the footer
author: Moorabbin Kangaroos

# Social / SEO metadata (used by jekyll-seo-tag)
twitter:
  username: moorabbinkangas
  card: summary_large_image

social:
  name: Moorabbin Kangaroos Football Club
  links:
    - https://www.facebook.com/MoorabbinKangas
    - https://www.instagram.com/moorabbinkangas
    - https://x.com/@moorabbinkangas
    - https://www.youtube.com/@MoorabbinKangas

# Footer social links (minima)
minima:
  social_links:
    - { platform: facebook, user_url: "https://www.facebook.com/MoorabbinKangas" }
    - { platform: instagram, user_url: "https://www.instagram.com/moorabbinkangas" }
    - { platform: twitter, user_url: "https://x.com/@moorabbinkangas" }
    - { platform: youtube, user_url: "https://www.youtube.com/@MoorabbinKangas" }

# Build settings
theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-github-metadata

header_pages:
  - index.md
  - about/index.md
  - news/index.md
  - players/index.md
  - gallery/index.md
  - sponsors/index.md
  - calendar/index.md
  - register/index.md
  - contact/index.md

show_excerpts: true

collections:
  players:
    output: true
    permalink: /players/:name/

defaults:
  - scope:
      path: ""
    values:
      image: /logo-2025.jpg
  - scope:
      path: ""
      type: players
    values:
      layout: player

# Exclude from processing.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - CHANGELOG.md
  - CNAME
  - LICENSE
  - README.md
  - screenshot.png
  - docs/
  - CLAUDE.md
  - _players/README.md
